<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch セーブ一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #ff6b35; --yellow: #ffca3a; --teal: #44c8b0;
  --purple: #9b5de5; --blue: #3a86ff; --green: #06d6a0;
  --red: #ef476f; --bg: #0c0c18; --card: #161628;
  --border: #252540; --text: #f0f0ff; --muted: #7777aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP','Nunito',sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 24px; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle, #ffffff06 1px, transparent 1px);
  background-size: 28px 28px; pointer-events: none; z-index: 0;
}
.blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
.blob.a { width: 500px; height: 500px; background: #9b5de515; top: -150px; left: -150px; }
.blob.b { width: 400px; height: 400px; background: #3a86ff12; bottom: -100px; right: -100px; }

.wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

.header { text-align: center; padding: 40px 0 32px; animation: up .6s ease both; }
.logo {
  font-family: 'Nunito',sans-serif; font-weight: 900; font-size: 2.2rem;
  background: linear-gradient(135deg, var(--orange), var(--yellow));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tagline { color: var(--muted); font-size: .85rem; margin-top: 6px; }

.status-bar {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 20px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  animation: up .5s ease .1s both;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 8px; animation: blink 2s infinite; }
.status-text { font-size: .82rem; color: var(--muted); }
.status-text span { color: var(--green); font-weight: 700; }
.refresh-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  border-radius: 8px; padding: 6px 14px; font-size: .78rem; font-family: inherit;
  cursor: pointer; transition: all .2s;
}
.refresh-btn:hover { border-color: var(--teal); color: var(--teal); }

.section-title {
  font-family: 'Nunito',sans-serif; font-weight: 900; font-size: 1.1rem;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  animation: up .5s ease .15s both;
}
.count-badge {
  background: linear-gradient(135deg, var(--orange), var(--yellow));
  color: #fff; font-size: .72rem; padding: 2px 10px; border-radius: 20px;
  font-family: 'Nunito',sans-serif; font-weight: 900;
}

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

.player-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 20px; position: relative; overflow: hidden;
  animation: up .4s ease both; transition: border-color .2s, transform .2s;
}
.player-card:hover { border-color: #3a3a60; transform: translateY(-2px); }
.player-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--purple));
}

.player-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.player-avatar {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.player-name { font-family: 'Nunito',sans-serif; font-weight: 900; font-size: 1rem; }
.player-sub { font-size: .72rem; color: var(--muted); }

.data-box {
  background: #0a0a16; border: 1px dashed var(--border); border-radius: 9px;
  padding: 10px 12px; font-family: monospace; font-size: .75rem; color: #8888bb;
  word-break: break-all; line-height: 1.5; max-height: 60px; overflow: hidden;
  position: relative;
}
.data-box::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 20px;
  background: linear-gradient(transparent, #0a0a16);
}

.save-time { font-size: .72rem; color: var(--muted); margin-top: 10px; text-align: right; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
  animation: up .5s ease both;
}
.empty-icon { font-size: 3rem; margin-bottom: 14px; }
.empty-text { font-size: .9rem; line-height: 1.8; }

.loading {
  text-align: center; padding: 40px; color: var(--muted); animation: up .3s ease both;
}
.sp { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff2; border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }

.last-action {
  background: #06d6a010; border: 1px solid #06d6a030; border-radius: 10px;
  padding: 10px 16px; font-size: .8rem; color: var(--green); margin-bottom: 16px;
  animation: up .3s ease both; display: none;
}

@keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
</style>
</head>
<body>

<div class="blob a"></div>
<div class="blob b"></div>

<div class="wrap">

  <div class="header">
    <div class="logo">🐱 ScratchSave</div>
    <div class="tagline">プレイヤーのセーブデータ一覧 — 自動更新中</div>
  </div>

  <div class="status-bar">
    <div>
      <span class="status-dot"></span>
      <span class="status-text">自動監視中 — Scratchの保存・読み込みを自動検出 | 最終確認: <span id="lastCheck">--</span></span>
    </div>
    <button class="refresh-btn" onclick="loadData()">🔄 今すぐ更新</button>
  </div>

  <div class="last-action" id="lastAction"></div>

  <div class="section-title">
    プレイヤー一覧 <span class="count-badge" id="countBadge">0</span>
  </div>

  <div id="playerGrid" class="player-grid">
    <div class="loading"><span class="sp"></span>読み込み中...</div>
  </div>

  <div style="text-align:center;margin-top:20px">
    <button class="refresh-btn" onclick="toggleConfig()" style="font-size:.75rem">⚙ Worker URLを設定</button>
    <div id="cfgBox" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px;margin-top:10px;text-align:left">
      <label style="display:block;font-size:.75rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">Cloudflare Worker URL</label>
      <input type="text" id="workerUrl" placeholder="https://xxxx.workers.dev"
        style="width:100%;padding:11px 14px;background:#0a0a16;border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none">
    </div>
  </div>

</div>

<script>
let WORKER_URL = localStorage.getItem('workerUrl') || 'https://plain-frost-317e.kanamoto-mac.workers.dev';

window.onload = () => {
  document.getElementById('workerUrl').value = WORKER_URL;
  document.getElementById('workerUrl').oninput = e => {
    WORKER_URL = e.target.value.trim();
    localStorage.setItem('workerUrl', WORKER_URL);
  };
  loadData();
  // 30秒ごとに自動更新
  setInterval(loadData, 30000);
};

function toggleConfig() {
  const box = document.getElementById('cfgBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

async function loadData() {
  document.getElementById('lastCheck').textContent = new Date().toLocaleTimeString('ja-JP');

  try {
    // プレイヤー一覧取得
    const res = await fetch(WORKER_URL.replace(/\/$/, '') + '/saves');
    const data = await res.json();

    const grid = document.getElementById('playerGrid');
    const badge = document.getElementById('countBadge');

    if (!data.ok || !data.players) throw new Error(data.error || '取得失敗');

    badge.textContent = data.players.length;

    if (data.players.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">💾</div>
          <div class="empty-text">まだセーブデータがありません。<br>Scratchプロジェクトで保存操作をするとここに表示されます。</div>
        </div>`;
      return;
    }

    grid.innerHTML = data.players.map((p, i) => `
      <div class="player-card" style="animation-delay:${i * 0.05}s">
        <div class="player-header">
          <div class="player-avatar">🎮</div>
          <div>
            <div class="player-name">@${escHtml(p.username)}</div>
            <div class="player-sub">プロジェクト: ${escHtml(String(p.projectId))}</div>
          </div>
        </div>
        <div class="data-box">${escHtml(p.dataPreview)}${p.dataPreview.length >= 80 ? '…' : ''}</div>
        <div class="save-time">🕐 ${new Date(p.savedAt).toLocaleString('ja-JP')}</div>
      </div>
    `).join('');

    // 最終アクション取得
    const statusRes = await fetch(WORKER_URL.replace(/\/$/, '') + '/status');
    const status = await statusRes.json();
    if (status.ok && status.lastAction) {
      const a = status.lastAction;
      const actionEl = document.getElementById('lastAction');
      const label = a.type === 'save' ? '💾 自動保存' : '📂 自動ロード';
      actionEl.textContent = `${label}: @${a.user} — ${new Date(a.at).toLocaleString('ja-JP')}`;
      actionEl.style.display = 'block';
    }

  } catch (e) {
    document.getElementById('playerGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">データの取得に失敗しました。<br><small style="color:#ef476f">${escHtml(e.message)}</small><br><br>Worker URLを確認してください。</div>
      </div>`;
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
